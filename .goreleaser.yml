---
version: 2
project_name: bigquery-emulator

builds:
  - main: ./cmd/bigquery-emulator
    binary: bigquery-emulator
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version=v{{ .Version }}
      - -X main.revision={{ .ShortCommit }}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: >-
      {{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

nfpms:
  - file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}-1_{{ .Arch }}
    homepage: https://github.com/goccy/bigquery-emulator
    maintainer: goccy
    description: BigQuery emulator server implemented in pure Go
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  prerelease: auto
