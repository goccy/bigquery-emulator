name: Bump

# Two jobs, both triggered on PR merge into main:
#
#   - bump: fires for non-release PRs (head != "release"). Recomputes
#     the bump amount from every PR merged since the most recent v*
#     tag, deletes the long-lived `release` branch and re-creates it
#     fresh from main, applies gobump once, and upserts the release
#     PR. Each run is fully idempotent: deleting the release branch
#     and re-running produces the same state.
#
#   - tag:  fires only for the release PR's merge (head == "release").
#     Reads version.go via gobump, tags the merge commit, and pushes
#     the tag. The tag push triggers release.yml, which creates the
#     GitHub Release.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref != 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Compute bump type from PRs merged since last tag
        id: bump_type
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          prev_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$prev_tag" ]; then
            since_iso="1970-01-01T00:00:00Z"
          else
            since_iso=$(git log -1 --format=%aI "${prev_tag}")
          fi
          prs=$(gh pr list \
            --base main \
            --state merged \
            --search "merged:>=${since_iso}" \
            --json number,labels \
            --limit 200)
          if echo "$prs" | jq -e 'any(.[].labels[]; .name == "major")' >/dev/null; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$prs" | jq -e 'any(.[].labels[]; .name == "minor")' >/dev/null; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-create release branch from main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Delete origin/release (if exists) before re-creating from
          # main, so the next push is unambiguously fresh state. The
          # branch is auto-managed and humans never push to it
          # directly, so unconditional delete is safe.
          git push origin --delete release 2>/dev/null || true
          git checkout -B release main

      - name: Bump version
        id: bump
        run: |
          set -euo pipefail
          go tool gobump "${{ steps.bump_type.outputs.type }}" -w .
          echo "version=$(go tool gobump show -r .)" >> "$GITHUB_OUTPUT"

      - name: Commit and push release branch
        run: |
          set -euo pipefail
          new_tag="v${{ steps.bump.outputs.version }}"
          git add version.go
          if git diff --cached --quiet; then
            echo "version.go unchanged after bump; nothing to commit"
            exit 0
          fi
          git commit -m "chore(release): ${new_tag}"
          # Plain push — branch was just deleted and re-created, so no
          # remote state to lose.
          git push origin release

      - name: Build PR body
        run: |
          set -euo pipefail
          new_version="v${{ steps.bump.outputs.version }}"
          prev_tag=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)
          if [ -z "$prev_tag" ]; then
            prev_ref=$(git rev-list --max-parents=0 origin/main | head -n1)
          else
            prev_ref="$prev_tag"
          fi
          repo_url="${{ github.server_url }}/${{ github.repository }}"
          {
            echo "## Release ${new_version}"
            echo
            echo "Bump type \`${{ steps.bump_type.outputs.type }}\` derived from labels on PRs merged since \`${prev_ref}\`. Latest trigger: #${{ github.event.pull_request.number }}."
            echo
            echo "### Range"
            echo
            echo "[\`${prev_ref}...release\`](${repo_url}/compare/${prev_ref}...release)"
            echo
            echo "### Commits since previous release"
            echo
            git log --no-merges --pretty=format:'- %s (%h)' "${prev_ref}..release"
            echo
          } > pr_body.md

      - name: Upsert release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          new_version="v${{ steps.bump.outputs.version }}"
          existing=$(gh pr list --head release --base main --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr edit "$existing" \
              --title "release: ${new_version}" \
              --body-file pr_body.md
          else
            gh pr create \
              --title "release: ${new_version}" \
              --body-file pr_body.md \
              --base main \
              --head release \
              --label release
          fi

  tag:
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.ref == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Read version
        id: version
        run: echo "tag=v$(go tool gobump show -r .)" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
