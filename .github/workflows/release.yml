name: Release

# Triggered when version.go advances on main — which only happens
# when bump.yml's release PR (head=release) merges. The branch
# push event with paths=version.go fires reliably for Action-
# driven merges, sidestepping the GITHUB_TOKEN-cannot-trigger-
# downstream-workflows limitation that ruled out the previous
# `on: push: tags` design.
#
# Two jobs:
#
#   smoke   — single-arch image build + e2e smoke test
#             (make e2e). Gates the publish step on a real
#             SELECT 1 round-trip rather than just "image built".
#
#   publish — needs: smoke. Multi-arch (amd64+arm64) build via
#             QEMU + buildx, push to ghcr.io, push the v* tag,
#             create the GitHub Release with --generate-notes
#             scoped to commits since the previous tag. Shares
#             the GHA buildx cache with smoke so amd64 layers
#             come from cache and only arm64 does real work.
on:
  push:
    branches: [main]
    paths:
      - 'version.go'

env:
  REGISTRY: ghcr.io

jobs:
  smoke:
    name: e2e smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: bigquery-emulator:local-test
          build-args: |
            REVISION=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: bring up emulator
        run: docker compose -f e2e/compose.yml up -d --no-build

      # Poll :9050 directly (Makefile's docker/healthcheck is local-only —
      # CI needs a wider retry window since a freshly-pulled image plus
      # cold start on a runner takes longer than 5s). curl -s (no -f) on
      # purpose: the emulator returns HTTP 500 for `GET /` so any HTTP
      # response counts as healthy; we only need port reachability.
      - name: wait for emulator
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            if curl -s -m 2 -o /dev/null http://localhost:9050/; then
              echo "OK: emulator responding on :9050 (attempt ${i})"
              exit 0
            fi
            sleep 1
          done
          echo "FAIL: emulator not reachable on :9050 after 30s" >&2
          docker compose -f e2e/compose.yml logs --tail=100 bigquery-emulator >&2 || true
          exit 1

      - name: run e2e tests
        run: go test -tags=e2e -count=1 -v ./e2e/...

      - name: tear down
        if: always()
        run: docker compose -f e2e/compose.yml down --volumes

  publish:
    name: tag + image + GitHub Release
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Read version
        id: version
        run: |
          set -euo pipefail
          v=$(go tool gobump show -r .)
          mm=$(echo "$v" | cut -d. -f1-2)
          {
            echo "tag=v${v}"
            echo "major_minor_tag=v${mm}"
          } >> "$GITHUB_OUTPUT"

      - name: Bail if tag already exists
        id: existing
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse --verify --quiet "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3
        if: steps.existing.outputs.skip != 'true'

      - uses: docker/setup-buildx-action@v3
        if: steps.existing.outputs.skip != 'true'

      - uses: docker/login-action@v3
        if: steps.existing.outputs.skip != 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        if: steps.existing.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.tag }}
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.version.outputs.major_minor_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            REVISION=${{ github.sha }}

      - name: Tag and create GitHub Release
        if: steps.existing.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          prev=$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"

          if [ -n "${prev}" ]; then
            gh release create "${tag}" \
              --title "${tag}" \
              --generate-notes \
              --notes-start-tag "${prev}"
          else
            gh release create "${tag}" \
              --title "${tag}" \
              --generate-notes
          fi
