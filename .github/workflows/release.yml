name: Release

# Triggered exclusively by `v*` tag pushes (which only happen via
# bump.yml's `tag` job when the release PR is merged). Creates the
# GitHub Release with auto-generated notes scoped to commits since
# the previous tag. The trigger is unambiguous: this workflow cannot
# fire for any other event.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Find previous tag
        id: prev
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # The current tag is at refs/tags/${tag}; find the next-most-
          # recent v* tag (excluding the current one) for the release-
          # notes start point.
          prev_tag=$(git tag --list 'v*' --sort=-v:refname | grep -vF "${tag}" | head -n1 || true)
          echo "tag=${prev_tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          prev="${{ steps.prev.outputs.tag }}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; skipping."
            exit 0
          fi
          if [ -n "${prev}" ]; then
            gh release create "${tag}" \
              --title "${tag}" \
              --generate-notes \
              --notes-start-tag "${prev}"
          else
            gh release create "${tag}" \
              --title "${tag}" \
              --generate-notes
          fi
