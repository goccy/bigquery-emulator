name: build and test
on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read
jobs:
  build:
    name: Build
    strategy:
      matrix:
        os: [ "ubuntu-latest", "macos-latest" ]
    runs-on: ${{ matrix.os }}
    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
    - name: cache for linux
      uses: actions/cache@v3
      if: runner.os == 'Linux'
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: cache for macOS
      uses: actions/cache@v3
      if: runner.os == 'macOS'
      with:
        path: |
          ~/Library/Caches/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: download modules
      run: |
        go mod download
    - name: build
      run: make emulator/build
      env:
        VERSION: test
    - name: show version
      run: |
        ./bigquery-emulator --version
    - name: show linking info
      if: runner.os == 'Linux'
      run: |
        ldd bigquery-emulator || true
  test:
    needs: build
    name: Test
    strategy:
      matrix:
        os: [ "ubuntu-latest", "macos-latest" ]
    runs-on: ${{ matrix.os }}
    steps:
    - name: checkout
      uses: actions/checkout@v6
    - name: setup Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
    - name: cache for linux
      uses: actions/cache@v3
      if: runner.os == 'Linux'
      with:
        path: |
          ~/.cache/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: cache for macOS
      uses: actions/cache@v3
      if: runner.os == 'macOS'
      with:
        path: |
          ~/Library/Caches/go-build
          ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: download modules
      run: |
        go mod download
    - name: test
      # test/e2e is the Docker-based conformance suite; it runs in its own
      # integration workflow, not in the unit test job.
      run: go test -v -count=1 $(go list ./... | grep -v '/test/e2e')
