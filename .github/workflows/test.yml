name: build and test
on:
  push:
    branches:
      - main
  pull_request:
    # Only fire on changes that affect the build / test result.
    # Workflow-only or docs-only PRs (e.g. release tooling tweaks)
    # skip the build+test cycle. Use workflow_dispatch as the escape
    # hatch when a forced run is wanted.
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: download modules
        run: go mod download
      - name: build
        run: make emulator/build
        env:
          VERSION: test
      - name: show version
        run: ./bigquery-emulator --version
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: download modules
        run: go mod download
      - name: test
        run: go test ./... -count=1 -timeout 600s
